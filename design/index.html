<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandlordHours — Design System & App Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light tokens */
  --bg:#F5F5F5;--bg2:#FFFFFF;--bg3:#EBEBEB;
  --primary:#7C6FF7;--primary-light:#A78BFA;--primary-surface:#EDE9FE;--primary-dark:#6355E8;
  --success:#34D399;--warning:#FBBF24;--error:#F472B6;--info:#60A5FA;
  --text1:#0D0D0D;--text2:#6B7280;--text3:#9CA3AF;
  --border:#D1D5DB;--border-light:#E5E7EB;
  /* Dark tokens */
  --d-bg:#0D0D0D;--d-bg2:#1C1C1C;--d-bg3:#2A2A2A;
  --d-primary:#9D8FF5;--d-primary-surface:#2D2A4A;
  --d-text1:#FFFFFF;--d-text2:#ADB1BD;--d-text3:#7A7E8A;
  --d-border:rgba(71,71,77,1);
  /* Spacing */
  --sp-xxs:4px;--sp-xs:8px;--sp-sm:12px;--sp-md:16px;--sp-lg:20px;--sp-xl:24px;--sp-xxl:32px;
  /* Radius */
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  /* Transitions */
  --ease:cubic-bezier(.4,0,.2,1);
}
html{font-size:16px}
body{
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:#0A0A0F;color:#E8E8ED;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ─── Outer Layout ─── */
.showcase{display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px}
.showcase-header{text-align:center;margin-bottom:56px;max-width:700px}
.showcase-header h1{
  font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.5rem);
  line-height:1.1;margin-bottom:16px;
  background:linear-gradient(135deg,#A78BFA 0%,#7C6FF7 40%,#34D399 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.showcase-header p{font-size:1.05rem;color:#9CA3AF;line-height:1.6}

/* ─── Screen Navigation ─── */
.screen-nav{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin-bottom:48px;max-width:960px;
}
.screen-nav button{
  padding:8px 18px;border-radius:100px;border:1px solid rgba(124,111,247,.25);
  background:transparent;color:#A78BFA;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s var(--ease);font-family:inherit;
  letter-spacing:.3px;
}
.screen-nav button:hover{background:rgba(124,111,247,.12);border-color:rgba(124,111,247,.5)}
.screen-nav button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ─── Phone Frame ─── */
.phone-stage{display:flex;gap:48px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.phone-col{display:flex;flex-direction:column;align-items:center;gap:16px}
.phone-col .mode-label{
  font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:#6B7280;
}
.phone-frame{
  width:375px;height:812px;border-radius:52px;overflow:hidden;position:relative;
  box-shadow:0 0 0 12px #1A1A2E,0 0 0 14px #2D2D44,0 40px 80px rgba(0,0,0,.6);
  flex-shrink:0;
}
.phone-frame::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:160px;height:34px;background:#1A1A2E;border-radius:0 0 20px 20px;z-index:100;
}
.phone-screen{
  width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;
  scrollbar-width:none;
}
.phone-screen::-webkit-scrollbar{display:none}

/* ─── Theme Containers ─── */
.light-theme{
  --t-bg:var(--bg);--t-bg2:var(--bg2);--t-bg3:var(--bg3);
  --t-primary:var(--primary);--t-primary-surface:var(--primary-surface);
  --t-text1:var(--text1);--t-text2:var(--text2);--t-text3:var(--text3);
  --t-border:var(--border);--t-success:var(--success);--t-warning:var(--warning);
  --t-error:var(--error);--t-info:var(--info);
}
.dark-theme{
  --t-bg:var(--d-bg);--t-bg2:var(--d-bg2);--t-bg3:var(--d-bg3);
  --t-primary:var(--d-primary);--t-primary-surface:var(--d-primary-surface);
  --t-text1:var(--d-text1);--t-text2:var(--d-text2);--t-text3:var(--d-text3);
  --t-border:var(--d-border);--t-success:#4ADE80;--t-warning:#FCD34D;
  --t-error:#F472B6;--t-info:#60A5FA;
}

/* ─── Shared Screen Styles ─── */
.screen{
  background:var(--t-bg);min-height:100%;padding:60px 20px 100px;
  display:none;flex-direction:column;
}
.screen.active{display:flex}

.screen h2.page-title{
  font-family:'DM Serif Display',serif;font-size:28px;color:var(--t-text1);
}
.screen .date-sub{font-size:14px;color:var(--t-text2);margin-top:3px}

.card{
  background:var(--t-bg2);border-radius:var(--r-xl);padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.dark-theme .card{box-shadow:none}

.capsule-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;
  letter-spacing:.6px;text-transform:uppercase;
  background:var(--t-primary-surface);color:var(--t-primary);
}

.section-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:100px;font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
  background:var(--t-bg3);color:var(--t-text2);
}

/* Icon badge */
.icon-badge{
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.icon-badge svg{width:20px;height:20px}
.icon-badge-sm{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.icon-badge-sm svg{width:16px;height:16px}
.soft-badge{
  width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.soft-badge svg{width:32px;height:32px}
.entry-badge{
  width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.entry-badge svg{width:20px;height:20px}

/* Buttons */
.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 28px;border-radius:100px;border:none;cursor:pointer;
  font-size:16px;font-weight:600;font-family:inherit;
  background:var(--t-primary);color:#fff;
}
.btn-dark{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 22px;border-radius:100px;border:none;cursor:pointer;
  font-size:15px;font-weight:600;font-family:inherit;
  background:#1A1A1A;color:#fff;
}
.dark-theme .btn-dark{background:#fff;color:#0D0D0D}

/* Tab bar */
.tab-bar{
  position:absolute;bottom:0;left:0;right:0;height:83px;
  display:flex;align-items:flex-start;justify-content:space-around;
  padding:10px 0 0;
  background:var(--t-bg2);border-top:1px solid var(--t-border);
  z-index:50;
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:10px;color:var(--t-text3);font-weight:500;cursor:pointer;
  transition:color .15s;padding:0 4px;
}
.tab-item svg{width:22px;height:22px;fill:var(--t-text3);transition:fill .15s}
.tab-item.active{color:var(--t-primary)}
.tab-item.active svg{fill:var(--t-primary)}

/* Progress ring */
.progress-ring{position:relative;width:190px;height:190px;margin:0 auto}
.progress-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.progress-ring .ring-bg{fill:none;stroke:var(--t-primary-surface);stroke-width:22}
.progress-ring .ring-fg{
  fill:none;stroke:url(#ringGrad);stroke-width:22;stroke-linecap:round;
  stroke-dasharray:534;stroke-dashoffset:267;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.progress-ring .ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.progress-ring .ring-value{font-size:46px;font-weight:700;color:var(--t-text1);font-variant-numeric:tabular-nums}
.progress-ring .ring-label{font-size:13px;color:var(--t-text2)}

/* Stat cards */
.stat-row{display:flex;gap:12px}
.stat-card{
  flex:1;padding:18px;border-radius:var(--r-xl);background:var(--t-bg2);
}
.stat-card .stat-label{font-size:12px;font-weight:500;color:var(--t-text2);margin-top:10px}
.stat-card .stat-val{font-size:30px;font-weight:700;color:var(--t-text1)}
.stat-card .stat-unit{font-size:13px;color:var(--t-text2);margin-left:3px}

/* Entry rows */
.entry-row{display:flex;align-items:center;gap:14px;padding:13px 16px}
.entry-row .entry-info{flex:1;min-width:0}
.entry-row .entry-title{font-size:15px;font-weight:500;color:var(--t-text1)}
.entry-row .entry-sub{font-size:13px;color:var(--t-text2)}
.entry-row .entry-hours{font-size:15px;font-weight:600;color:var(--t-text1);text-align:right}
.entry-row .entry-date{font-size:12px;color:var(--t-text2);text-align:right}
.entry-divider{height:1px;background:var(--t-border);opacity:.4;margin-left:72px}

/* Chip row */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  padding:8px 14px;border-radius:100px;font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;border:none;font-family:inherit;
  background:var(--t-bg3);color:var(--t-text1);transition:all .15s;
}
.chip.active{background:var(--t-primary);color:#fff}

/* Filter chip */
.filter-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 12px;border-radius:100px;font-size:13px;font-weight:500;
  background:var(--t-bg2);color:var(--t-text2);
  box-shadow:0 2px 4px rgba(0,0,0,.04);
}
.filter-chip.active{background:var(--t-primary-surface);color:var(--t-primary)}

/* Summary chips */
.summary-row{display:flex;gap:12px}
.summary-chip{
  flex:1;padding:10px;border-radius:var(--r-md);text-align:center;
}
.summary-chip .sum-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.summary-chip .sum-label{font-size:11px;color:var(--t-text2)}

/* Form rows */
.form-row{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;
}
.form-row .form-icon{width:24px;text-align:center;color:var(--t-primary)}
.form-row .form-label{font-size:15px;color:var(--t-text1);flex:1}
.form-row .form-value{font-size:15px;color:var(--t-text2)}
.form-divider{height:1px;background:var(--t-border);opacity:.3;margin-left:52px}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cat-cell{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:18px 8px;border-radius:18px;background:var(--t-bg2);
}
.cat-cell .cat-badge{
  width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;
}
.cat-cell .cat-badge svg{width:22px;height:22px}
.cat-cell .cat-name{font-size:11px;font-weight:500;color:var(--t-text1);text-align:center;line-height:1.3}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:12px;padding:12px}
.bar-row .bar-label{font-size:14px;color:var(--t-text1);width:100px;flex-shrink:0}
.bar-track{flex:1;height:8px;border-radius:4px;background:var(--t-bg3);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s var(--ease)}
.bar-row .bar-val{font-size:14px;color:var(--t-text2);width:50px;text-align:right;flex-shrink:0}

/* List group */
.list-group{border-radius:var(--r-md);overflow:hidden;background:var(--t-bg2)}
.list-row{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
}
.list-row .list-icon{width:24px;display:flex;justify-content:center}
.list-row .list-icon svg{width:18px;height:18px;fill:var(--t-primary)}
.list-row .list-text{flex:1;font-size:15px;color:var(--t-text1)}
.list-row .list-detail{font-size:14px;color:var(--t-text2)}
.list-divider{height:1px;background:var(--t-border);opacity:.3;margin-left:52px}

/* Section header */
.section-header{font-size:17px;font-weight:600;color:var(--t-text1);margin:24px 0 12px}

/* Paywall hero */
.pw-hero{text-align:center;padding:32px 0}
.pw-price{font-size:48px;font-weight:700;color:var(--t-text1);font-variant-numeric:tabular-nums}
.pw-price-sub{font-size:13px;color:var(--t-text2)}

/* Onboarding */
.ob-dots{display:flex;gap:6px;justify-content:center;margin:20px 0}
.ob-dot{width:100%;height:4px;border-radius:100px;background:var(--t-border)}
.ob-dot.active{background:var(--t-primary)}

/* Splash */
.splash-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;
  background:linear-gradient(180deg,#fff 0%,var(--primary-surface) 100%);
}
.dark-theme .splash-screen{
  background:linear-gradient(180deg,var(--d-bg) 0%,var(--d-primary-surface) 100%);
}

/* Segmented control */
.segmented{
  display:inline-flex;border-radius:8px;overflow:hidden;background:var(--t-bg3);
}
.seg-btn{
  padding:6px 16px;font-size:13px;font-weight:500;border:none;cursor:pointer;
  font-family:inherit;color:var(--t-text2);background:transparent;
}
.seg-btn.active{background:var(--t-bg2);color:var(--t-text1);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Property card */
.property-card{
  padding:16px;border-radius:var(--r-xl);background:var(--t-bg2);
  display:flex;align-items:center;gap:14px;
}
.property-card .prop-info{flex:1;min-width:0}
.property-card .prop-name{font-size:16px;font-weight:600;color:var(--t-text1)}
.property-card .prop-addr{font-size:13px;color:var(--t-text2);margin-top:2px}
.prop-type-badge{
  display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;
  font-weight:700;letter-spacing:.5px;margin-top:6px;
}

/* Feature row (paywall) */
.feature-row{
  display:flex;align-items:center;gap:14px;
  padding:14px;border-radius:18px;background:var(--t-bg2);
}
.feature-row .feat-text{flex:1}
.feature-row .feat-title{font-size:15px;font-weight:600;color:var(--t-text1)}
.feature-row .feat-desc{font-size:13px;color:var(--t-text2)}

/* Textarea mock */
.mock-textarea{
  background:var(--t-bg);border-radius:var(--r-md);padding:16px;
  font-size:16px;color:var(--t-text3);min-height:80px;
}

/* ─── Responsive ─── */
@media(max-width:860px){
  .phone-stage{flex-direction:column;align-items:center}
  .phone-frame{transform:scale(.85);transform-origin:top center}
}
@media(max-width:420px){
  .phone-frame{transform:scale(.7);transform-origin:top center}
}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.animate-in{animation:fadeUp .5s var(--ease) both}
.animate-in-d1{animation:fadeUp .5s var(--ease) .1s both}
.animate-in-d2{animation:fadeUp .5s var(--ease) .2s both}
.animate-in-d3{animation:fadeUp .5s var(--ease) .3s both}
.animate-in-d4{animation:fadeUp .5s var(--ease) .4s both}
.animate-in-d5{animation:fadeUp .5s var(--ease) .5s both}
</style>
</head>
<body>

<!-- SVG Defs -->
<svg style="position:absolute;width:0;height:0">
<defs>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C6FF7"/><stop offset="100%" stop-color="#A78BFA"/>
  </linearGradient>
  <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#6D28D9"/>
  </linearGradient>
</defs>
</svg>

<div class="showcase">
  <!-- Header -->
  <div class="showcase-header animate-in">
    <h1>LandlordHours Design System</h1>
    <p>Complete screen designs for the iOS app. Tiimo-inspired, soft &amp; modern. Click a screen below to preview light and dark modes side by side.</p>
  </div>

  <!-- Screen Nav -->
  <div class="screen-nav animate-in-d1" id="screenNav">
    <button class="active" data-screen="splash">Splash</button>
    <button data-screen="onboarding">Onboarding</button>
    <button data-screen="dashboard">Dashboard</button>
    <button data-screen="properties">Properties</button>
    <button data-screen="track">Track Time</button>
    <button data-screen="history">History</button>
    <button data-screen="reports">Reports</button>
    <button data-screen="settings">Settings</button>
    <button data-screen="paywall">Paywall</button>
  </div>

  <!-- Phone Stage -->
  <div class="phone-stage animate-in-d2" id="phoneStage">
    <!-- Light -->
    <div class="phone-col">
      <span class="mode-label">Light Mode</span>
      <div class="phone-frame">
        <div class="phone-screen light-theme" id="lightPhone"></div>
      </div>
    </div>
    <!-- Dark -->
    <div class="phone-col">
      <span class="mode-label">Dark Mode</span>
      <div class="phone-frame">
        <div class="phone-screen dark-theme" id="darkPhone"></div>
      </div>
    </div>
  </div>
</div>

  track: `<svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8.5"/><rect x="10.5" y="1.5" width="3" height="3.5" rx="1"/><rect x="11.3" y="7.5" width="1.4" height="5.5" rx=".7" style="mix-blend-mode:difference"/><rect x="12" y="12.3" width="4.5" height="1.4" rx=".7" style="mix-blend-mode:difference"/><circle cx="12" cy="13" r="1.2" style="mix-blend-mode:difference"/></svg>`,
  reports: `<svg viewBox="0 0 24 24"><rect x="3" y="14" width="4.5" height="7" rx="1.5"/><rect x="9.75" y="8" width="4.5" height="13" rx="1.5"/><rect x="16.5" y="3" width="4.5" height="18" rx="1.5"/></svg>`,

function tabBar(active) {
  const tabs = [
    {id:'home',icon:'home',label:'Home'},
    {id:'properties',icon:'properties',label:'Properties'},
    {id:'track',icon:'track',label:'Track'},
    {id:'reports',icon:'reports',label:'Reports'},
    {id:'settings',icon:'settings',label:'Settings'},
  ];
  return `<div class="tab-bar">${tabs.map(t =>
    `<div class="tab-item ${t.id===active?'active':''}" data-tab="${t.id}">
      <div style="width:22px;height:22px">${ic(t.icon)}</div>
      <span>${t.label}</span>
    </div>`
  ).join('')}</div>`;
}

// ─── Render Logic ───
const lightPhone = document.getElementById('lightPhone');
const darkPhone = document.getElementById('darkPhone');
const navBtns = document.querySelectorAll('.screen-nav button');

function showScreen(name) {
  const gen = screens[name];
  if (!gen) return;
  lightPhone.innerHTML = gen();
  darkPhone.innerHTML = gen();

  // Wire tab clicks
  document.querySelectorAll('.tab-item[data-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      const screenMap = {home:'dashboard',properties:'properties',track:'track',reports:'reports',settings:'settings'};
      const screenName = screenMap[target];
      if (screenName && screens[screenName]) {
        showScreen(screenName);
        navBtns.forEach(b => b.classList.toggle('active', b.dataset.screen === screenName));
      }
    });
  });
}

navBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    navBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showScreen(btn.dataset.screen);
  });
});

// Initial
showScreen('splash');
</script>
