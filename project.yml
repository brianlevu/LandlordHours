name: LandlordHours
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  LucideIcons:
    url: https://github.com/JakubMazur/lucide-icons-swift.git
    from: 0.575.0

targets:
  LandlordHours:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: LucideIcons
    entitlements:
      path: LandlordHours.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.openclaw.landlordhours
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.openclaw.landlordhours
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.landlordhours
        DEVELOPMENT_TEAM: G68NLC3DA3
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  LandlordHoursTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: LandlordHours.storekit
        buildPhase: resources
    dependencies:
      - target: LandlordHours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.landlordhours.tests
        DEVELOPMENT_TEAM: G68NLC3DA3
        GENERATE_INFOPLIST_FILE: YES
  LandlordHoursUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: LandlordHours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.landlordhours.uitests
        DEVELOPMENT_TEAM: G68NLC3DA3
        TEST_TARGET_NAME: LandlordHours
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LandlordHours:
    shared: true
    build:
      targets:
        LandlordHours: all
    test:
      targets:
        - LandlordHoursTests
        - LandlordHoursUITests
